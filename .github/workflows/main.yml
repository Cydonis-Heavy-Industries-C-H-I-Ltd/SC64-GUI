id: io.github.example.Sc64Gui
runtime: org.kde.Platform
runtime-version: "6.8"
sdk: org.kde.Sdk
command: sc64gui

finish-args:
  - --socket=wayland
  - --socket=fallback-x11
  - --share=ipc
  - --device=all          # USB / serial access to the SummerCart64
  - --filesystem=home:ro  # read the ROM files the user picks

modules:
  - name: sc64-gui
    buildsystem: cmake-ninja
    config-opts:
      - -DCMAKE_BUILD_TYPE=Release
      - -DAPP_ID=io.github.example.Sc64Gui
    sources:
      - type: dir
        path: .
