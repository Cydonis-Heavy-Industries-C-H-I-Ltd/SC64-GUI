name: Windows

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

jobs:
  windows:
    name: Build Windows (x64)
    runs-on: windows-2022
    permissions:
      contents: write   # only used by the release step on tag pushes
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Qt (with SerialPort module)
        uses: jurplel/install-qt-action@v4
        with:
          version: "6.8.*"
          host: windows
          target: desktop
          arch: win64_msvc2022_64
          modules: qtserialport

      - name: Configure
        run: cmake -B build -G "Visual Studio 17 2022" -A x64

      - name: Build
        run: cmake --build build --config Release

      - name: Deploy Qt runtime into dist\
        run: |
          mkdir dist
          copy build\Release\sc64gui.exe dist\
          windeployqt --release --qmldir qml --no-translations --compiler-runtime dist\sc64gui.exe

      - name: Package ZIP
        run: Compress-Archive -Path dist\* -DestinationPath SC64_File_Transfer-windows-x64.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-x64
          path: SC64_File_Transfer-windows-x64.zip
          if-no-files-found: error

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v3
        with:
          files: SC64_File_Transfer-windows-x64.zip
          fail_on_unmatched_files: true
